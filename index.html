<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restroom Radar</title>
  <link rel="stylesheet" href="style.css">
  <!-- Mapbox GL CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>
  <header class="topbar">
    <div class="container navbar">
      <h1>🚻 Restroom Radar</h1>
    <a href="login.html"> Login</a>
    <a href="profile.html"> Profile</a>
      <input type="text" placeholder="Search location...">
    </div>
  </header>


<div class="container layout">


  <aside class="filters">
    <h3>Filters</h3>
    <label><input type="checkbox"> Accessible</label>
    <label><input type="checkbox"> Baby Station</label>
    <label><input type="checkbox"> Open Now</label>

    <button class="btn-primary">Apply Filters</button>
  </aside>


  <main class="map-area">

    <div id="map"></div>


    <div class="cards-wrapper">

      <h2 class="section-title">🔥 Popular Spots</h2>
    <div class="cards">

        <div class="card" data-description="Public restroom near the Astoria Park waterfront with accessible facilities and seasonal hours.">
          <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Astoria_Park_Basketball_Courts.jpg" alt="Astoria Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Astoria Park Restroom</h3>
          <p>⭐ 4.5 • 4 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Restroom near Flushing Meadows — convenient for park visitors and events; check hours during fairs.">
          <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Unisphere_Flushing_Meadows.JPG" alt="Flushing Meadows" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Flushing Meadows Restroom</h3>
          <p>⭐ 4.3 • 10 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Brooklyn Bridge Park restroom with great waterfront access; busy on weekends but well-maintained.">
          <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Brooklyn_Bridge_Park_from_DUMBO.jpg" alt="Brooklyn Bridge Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Brooklyn Bridge Park Restroom</h3>
          <p>⭐ 4.7 • 7 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Restroom inside Prospect Park near the main entrances; good for families and longer stays.">
          <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/8/80/Prospect_Park_Wilderness_Area.jpg" alt="Prospect Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Prospect Park Restroom</h3>
          <p>⭐ 4.6 • 9 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

      </div>

  </main>

</div>


<script src="env.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
