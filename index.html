<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restroom Radar</title>
  <link rel="stylesheet" href="style.css">
  <!-- Mapbox GL CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>
  <header class="topbar">
    <div class="container navbar">
      <h1>🚻 Restroom Radar</h1>
    <a href="login.html"> Login</a>
    <a href="profile.html"> Profile</a>
      <input type="text" placeholder="Search location...">
    </div>
  </header>


<div class="container layout">


  <aside class="filters">
    <h3>Filters</h3>
    <label><input type="checkbox"> Accessible</label>
    <label><input type="checkbox"> Baby Station</label>
    <label><input type="checkbox"> Open Now</label>

    <button class="btn-primary">Apply Filters</button>
  </aside>


  <main class="map-area">

    <div id="map"></div>


    <div class="cards-wrapper">

      <h2 class="section-title">🔥 Popular Spots</h2>
    <div class="cards">

        <div class="card" data-description="Public restroom near the Astoria Park waterfront with accessible facilities and seasonal hours.">
          <img class="card-img" src="https://assets.dnainfo.com/generated/photo/2015/06/playground-toilets-2-1434044626.jpg/extralarge.jpg" alt="Astoria Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Astoria Park Restroom</h3>
          <p>⭐ 3.8 • 4 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Restroom near Gantry Plaza State Park with great waterfront views and nearby seating.">
          <img class="card-img" src="https://qns.com/wp-content/uploads/2025/09/Untitled-design.jpg?quality=51" alt="Gantry Plaza" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Gantry Plaza State Park Restroom</h3>
          <p>⭐ 4.8 • 8 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Brooklyn Bridge Park restroom with great waterfront access; busy on weekends but well-maintained.">
          <img class="card-img" src="https://storage.ghost.io/c/29/5d/295dd95c-dc6c-40d7-9ed4-60debccaffe7/content/images/size/w1200/2025/05/IMG_5713.jpg" alt="Brooklyn Bridge Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Brooklyn Bridge Park Restroom</h3>
          <p>⭐ 4.8 • 7 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card" data-description="Public restroom along the Coney Island boardwalk — convenient for beachgoers and attractions.">
          <img class="card-img" src="https://c8.alamy.com/comp/R4A90D/futuristic-bathrooms-coney-island-brooklyn-new-york-united-states-of-america-R4A90D.jpg" alt="Coney Island" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Coney Island Boardwalk Restroom</h3>
          <p>⭐ 4.5 • 12 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

      </div>

  </main>

</div>


<script src="env.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
