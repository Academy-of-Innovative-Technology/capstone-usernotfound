<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restroom Radar</title>
  <link rel="stylesheet" href="style.css">
  <!-- Mapbox GL CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>


<header class="container navbar">
  <h1>🚻 Restroom Radar</h1>
  <input type="text" placeholder="Search location...">
</header>


<div class="container layout">


  <aside class="filters">
    <h3>Filters</h3>
    <label><input type="checkbox"> Accessible</label>
    <label><input type="checkbox"> Baby Station</label>
    <label><input type="checkbox"> Open Now</label>

    <button class="btn-primary">Apply Filters</button>
  </aside>


  <main class="map-area">

    <div id="map"></div>


    <div class="cards-wrapper">

      <h2 class="section-title">🔥 Popular Spots</h2>

      <div class="cards">

        <div class="card">
          <img class="card-img" src="https://d2wsrtli9cxkek.cloudfront.net/media/images/West61stStreetComfortStation_20201105_2543_2021-08-02-150315.jpg?auto=compress%2Cformat&crop=focalpoint&fit=crop&fp-x=0.5044&fp-y=0.6649&h=1151.1627906977&q=80&w=2475&s=f3b1c77b65512c81cb22148c4212acf7" alt="Central Park" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Central Park Restroom</h3>
          <p>⭐ 4.6 • 3 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card">
          <img class="card-img" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Times_Square_April_2022_by_Don_Ramey_Logan.jpg" alt="Times Square" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Times Square Public Bathroom</h3>
          <p>⭐ 4.2 • 5 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card">
          <img class="card-img" src="https://s3-media0.fl.yelpcdn.com/bphoto/QRlD0KC5KOaXPUDG8lN7Mg/348s.jpg" alt="Union Square" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Union Square Station</h3>
          <p>⭐ 4.0 • 6 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

        <div class="card">
          <img class="card-img" src="https://i.redd.it/no-matter-the-break-up-or-situation-i-would-not-want-to-v0-bv5stzoxt25a1.jpg?width=3024&format=pjpg&auto=webp&s=2a0ec74f8ebda2792604cf11e60160405d484528" alt="Grand Central" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;">
          <h3>Grand Central Terminal</h3>
          <p>⭐ 4.7 • 8 min away</p>
          <button class="btn-primary">View Details</button>
        </div>

      </div>

    </div>

  </main>

</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="env.js"></script>
<script src="app.js"></script>
</body>
</html>
