<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Restroom Radar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main style="display:flex;align-items:center;justify-content:center;height:100vh;">
    <form id="login-form" class="login-box" style="width:400px;">
      <h2>Welcome to Restroom Radar</h2>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <label for="zipcode">Zip Code</label>
      <input id="zipcode" name="zipcode" type="text" inputmode="numeric" required>

      <button id="submit-login" type="submit" class="btn-primary">Go to Radar</button>
    </form>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username')?.value?.trim();
      const password = document.getElementById('password')?.value?.trim();
      const zipcode = document.getElementById('zipcode')?.value?.trim();

      if (!username || !password) { alert('Enter username and password'); return; }
      if (!/^[0-9]{5}$/.test(zipcode)) { alert('Enter 5-digit ZIP code'); return; }

      try { sessionStorage.setItem('user', JSON.stringify({ username, zipcode })); } catch (e) {}
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
